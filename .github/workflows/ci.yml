name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Job 1: Run tests ──────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: 1e7b9e71fdfe5621fbab5374e508de88a91c0ffb4a68ed9bdde918732e7e3ea9
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60

  # ── Job 2: Build and push Docker images ──────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test # only runs if test job passes
    if: github.ref == 'refs/heads/main' # only on main branch

    permissions:
      contents: read
      packages: write # needed to push to GHCR
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobtrackr-backend:latest
            ghcr.io/${{ github.repository_owner }}/jobtrackr-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jobtrackr-frontend:latest
            ghcr.io/${{ github.repository_owner }}/jobtrackr-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://api.jobtrackr.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
