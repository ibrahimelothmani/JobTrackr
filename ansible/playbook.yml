- name: Setup JobTrackr Server
  hosts: web
  become: true

  tasks:

    - name: Update and upgrade system
      apt:
        update_cache: yes
        upgrade: dist

    - name: Install essential packages
      apt:
        name:
          - git
          - curl
          - ufw
          - fail2ban
        state: present

    # ── UFW CONFIG ─────────────────────────────
    - name: Set default UFW policies
      ufw:
        direction: incoming
        policy: deny

    - name: Allow outgoing traffic
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow SSH
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Enable UFW
      ufw:
        state: enabled

    # ── DOCKER INSTALL ─────────────────────────
    - name: Install Docker (official script)
      shell: curl -fsSL https://get.docker.com | sh
      args:
        executable: /bin/bash

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Restart Docker service
      service:
        name: docker
        state: restarted

    - name: Verify Docker installation
      command: docker run hello-world
